<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>rawr.xyz</title>
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --card-bg: rgba(8, 16, 26, 0.6);
            --card-border: rgba(80, 130, 180, 0.3);
            --card-border-hover: rgba(110, 170, 220, 0.5);
            --text-primary: #e8f4ff;
            --text-muted: #8ab0cc;
            --btn-bg: rgba(20, 35, 55, 0.75);
            --btn-border: rgba(80, 130, 180, 0.35);
            --btn-hover-bg: rgba(40, 80, 120, 0.8);
            --btn-hover-border: rgba(130, 190, 240, 0.7);
            --accent: #5c9fd4;
            --green: #7dd3b8;
        }

        body {
            min-height: 100vh;
            background: #060d16;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            color: var(--text-primary);
        }

        .scene {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            background: radial-gradient(ellipse 70% 60% at 35% 25%, #0e1e30, #030810);
        }

        .rain { position: absolute; inset: 0; }

        .drop {
            position: absolute;
            bottom: 100%;
            border-radius: 0 0 2px 2px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(2deg); opacity: 0; }
        }

        .scene-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 80%, rgba(0,0,0,0.15), rgba(0,0,0,0.45));
            z-index: 1;
            pointer-events: none;
        }

        .flash {
            position: fixed;
            inset: 0;
            background: rgba(240, 248, 255, 0.88);
            pointer-events: none;
            z-index: 5;
            opacity: 0;
        }

        .card {
            position: relative;
            z-index: 20;
            width: min(560px, 92%);
            margin: 2rem auto;
            padding: 2.5rem 2.25rem 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(14px);
            border-radius: 1.5rem;
            border: 1px solid var(--card-border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.03) inset;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            border-color: var(--card-border-hover);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 18px rgba(60,120,180,0.15), 0 0 0 1px rgba(255,255,255,0.04) inset;
        }

        .site-name {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-primary);
            font-family: Georgia, serif;
            margin-bottom: 0.3rem;
        }

        .tagline {
            font-size: 0.88rem;
            color: var(--text-muted);
            letter-spacing: 0.4px;
            margin-bottom: 1.75rem;
        }

        .intro {
            font-size: 1rem;
            line-height: 1.7;
            color: #c8dff0;
            font-weight: 400;
            margin-bottom: 1.75rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.85rem 1.2rem;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 0.85rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
            text-decoration: none;
            width: 100%;
            text-align: left;
        }

        .link-btn:hover {
            background: var(--btn-hover-bg);
            border-color: var(--btn-hover-border);
            transform: translateY(-2px);
        }

        .link-btn:active { transform: translateY(0) scale(0.98); }

        .btn-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            color: var(--accent);
            fill: none;
            stroke: currentColor;
            stroke-width: 1.75;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn-icon.success { color: var(--green); }

        .label { flex: 1; }

        .trail-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            color: var(--text-muted);
            fill: none;
            stroke: currentColor;
            stroke-width: 1.75;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: color 0.2s;
        }

        .trail-icon.success { color: var(--green); }

        .copy-feedback {
            font-size: 0.8rem;
            color: var(--green);
            font-weight: 400;
            min-width: 2rem;
            text-align: right;
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(80, 130, 180, 0.2);
            margin: 1.75rem 0 1.25rem;
        }

        .footer {
            font-size: 0.78rem;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        @media (max-width: 480px) {
            .card { padding: 1.75rem 1.25rem 1.5rem; }
            .site-name { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="scene"><div class="rain" id="rain"></div></div>
<div class="scene-overlay"></div>
<div class="flash" id="flash"></div>

<div class="card">
    <h1 class="site-name">rawr.xyz</h1>
    <p class="tagline">something is coming here eventually</p>

    <p class="intro">
        hey, glad you found this. not much to see yet &mdash; just a placeholder
        while things get built. reach out if you need anything.
    </p>

    <div class="links">

        <!-- Discord server link -->
        <a href="https://discord.gg/UFjWRWsSB" target="_blank" rel="noopener noreferrer" class="link-btn">
            <!-- Discord logo SVG -->
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor" stroke="none">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.032.054a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
            </svg>
            <span class="label">Join the Discord</span>
            <!-- Arrow right -->
            <svg class="trail-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14M13 6l6 6-6 6"/>
            </svg>
        </a>

        <!-- Copy username -->
        <button class="link-btn" id="copyBtn" aria-label="Copy Discord username 6x94">
            <!-- @ icon -->
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4"/>
                <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/>
            </svg>
            <span class="label">Discord: <strong>6x94</strong></span>
            <span class="copy-feedback" id="copyFeedback" aria-live="polite"></span>
            <svg class="trail-icon" id="trailIcon" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
        </button>

    </div>

    <hr class="divider">
    <p class="footer">made by a person, for no particular reason</p>
</div>

<script>
(function () {
    const rain = document.getElementById('rain');

    function buildRain() {
        rain.innerHTML = '';
        const count = window.innerWidth < 600 ? 200 : window.innerWidth < 1200 ? 350 : 500;
        const frag = document.createDocumentFragment();
        for (let i = 0; i < count; i++) {
            const d = document.createElement('div');
            d.className = 'drop';
            const w = 1.2 + Math.random() * 1.8;
            const h = 10 + Math.random() * 18;
            d.style.cssText = `width:${w}px;height:${h}px;left:${Math.random()*100}%;` +
                `background:rgba(155,210,255,${(0.35+Math.random()*0.3).toFixed(2)});` +
                `animation-duration:${(0.55+Math.random()*1.4).toFixed(2)}s;` +
                `animation-delay:${(Math.random()*3).toFixed(2)}s;` +
                `opacity:${(0.35+Math.random()*0.45).toFixed(2)};`;
            frag.appendChild(d);
        }
        rain.appendChild(frag);
    }

    const flash = document.getElementById('flash');
    let ltTimer = null;

    function strike(strength) {
        const alpha = { soft: 0.4, medium: 0.7, strong: 0.92 }[strength] ?? 0.7;
        flash.style.transition = 'opacity 0.05s linear';
        flash.style.opacity = Math.min(0.95, alpha + Math.random() * 0.2);
        setTimeout(() => { flash.style.opacity = 0; }, 65 + Math.random() * 35);
        if (Math.random() > 0.65) {
            setTimeout(() => {
                flash.style.opacity = (alpha * 0.55).toFixed(2);
                setTimeout(() => { flash.style.opacity = 0; }, 38);
            }, 110 + Math.random() * 200);
        }
    }

    function schedule() {
        ltTimer = setTimeout(() => {
            const r = Math.random();
            const s = r < 0.28 ? 'soft' : r < 0.72 ? 'medium' : 'strong';
            strike(s);
            if (Math.random() > 0.72) setTimeout(() => strike(s === 'strong' ? 'medium' : 'soft'), 140 + Math.random() * 240);
            schedule();
        }, 3500 + Math.random() * 9000);
    }

    const copyBtn = document.getElementById('copyBtn');
    const copyFeedback = document.getElementById('copyFeedback');
    const trailIcon = document.getElementById('trailIcon');
    const USERNAME = '6x94';

    const CHECK_SVG = '<path d="M20 6 9 17l-5-5"/>';
    const COPY_SVG = '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>';

    copyBtn.addEventListener('click', async () => {
        try { await navigator.clipboard.writeText(USERNAME); }
        catch {
            const ta = document.createElement('textarea');
            ta.value = USERNAME; document.body.appendChild(ta); ta.select();
            document.execCommand('copy'); ta.remove();
        }
        copyFeedback.textContent = 'copied';
        trailIcon.innerHTML = CHECK_SVG;
        trailIcon.classList.add('success');
        setTimeout(() => {
            copyFeedback.textContent = '';
            trailIcon.innerHTML = COPY_SVG;
            trailIcon.classList.remove('success');
        }, 1800);
    });

    let resizeT;
    window.addEventListener('resize', () => { clearTimeout(resizeT); resizeT = setTimeout(buildRain, 200); });
    window.addEventListener('beforeunload', () => clearTimeout(ltTimer));

    buildRain();
    schedule();
    setTimeout(() => strike('soft'), 900);
})();
</script>
</body>
</html>
